<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо за заявку!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b3d2e; /* Твой фирменный изумрудный цвет */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #0b3d2e;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            color: #555;
        }
        .gift-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #0b3d2e;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #125e47;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="gift-icon">🎁</div>
    <h1>Спасибо!</h1>
    <p>Благодарю за проявленный интерес к моей странице и за заполнение формы.</p>
    <p><strong>Вы можете рассчитывать на приятный сюрприз от меня!</strong> Ссылка или информация скоро придет к вам.</p>
    <a href="https://tatdavi01.github.io/" class="btn">Вернуться на главную</a>
</div>

</body>
</html>

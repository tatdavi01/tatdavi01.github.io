<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Первая Страница</title>
</head>
<body>
    <h1>Привет! Я tatdavi01 — Веб-Разработчик</h1>
    <p>Это мой самый первый настоящий сайт, запущенный на GitHub Pages!</p>
    <hr>
    <h3>Мои текущие навыки:</h3>
    <ul>
        <li>Создание репозиториев на GitHub (Уровень: Профи)</li>
        <li>Базовая разметка HTML и создание форм</li>
        <li>Работа со сторонними серверами (FormSubmit)</li>
    </ul>

    <hr>
    <h3>Связаться со мной:</h3>
    <!-- Наша обновленная форма обратной связи -->
    <form action="https://formsubmit.co/tatdavi01@gmail.com" method="POST">
        <div>
            <label for="username">Ваше имя:</label><br>
            <input type="text" id="username" name="name" required placeholder="Иван">
        </div>
        <br>
        <div>
            <label for="userphone">Номер телефона:</label><br>
            <!-- Выпадающий список для кодов стран -->
            <select name="country_code" style="padding: 3px; height: 24px;">
                <option value="+420">🇨🇿 CZ (+420)</option>
                <option value="+380">🇺🇦 UA (+380)</option>
                <option value="+7">🇷🇺 RU (+7)</option>
            </select>
            <!-- Поле для самого номера телефона -->
            <input type="tel" id="userphone" name="phone" required placeholder="777 123 456" style="width: 120px;">
        </div>
        <br>
        <div>
            <label for="useremail">E-mail:</label><br>
            <input type="email" id="useremail" name="email" required placeholder="example@mail.com">
        </div>
        <br>
        <button type="submit">Отправить заявку</button>
    </form>
</body>
</html>
